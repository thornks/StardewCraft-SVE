name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out SVE
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 21.0.8+9
          cache: gradle

      - name: Restore pinned StardewCraft dependency
        id: stardewcraft-cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ${{ runner.temp }}/deps/stardewcraft.jar
          key: stardewcraft-${{ runner.os }}-${{ hashFiles('gradle.properties', 'tools/prepare_stardewcraft.sh') }}

      - name: Build pinned StardewCraft dependency
        if: steps.stardewcraft-cache.outputs.cache-hit != 'true'
        run: bash tools/prepare_stardewcraft.sh "$RUNNER_TEMP/stardewcraft" "$RUNNER_TEMP/deps/stardewcraft.jar"

      - name: Verify and build SVE
        env:
          STARDEWCRAFT_JAR: ${{ runner.temp }}/deps/stardewcraft.jar
        run: ./gradlew clean check jar --no-daemon --console=plain

      - name: Upload verified JAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stardewcraftsve-${{ github.sha }}
          path: build/libs/stardewcraftsve-*.jar
          if-no-files-found: error
          retention-days: 14
